<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Results</title>
    <meta name="description"
          content="Страница результатов" />
    <link rel="stylesheet" href="css/style.min.css" />
    <link rel="stylesheet" href="js/main.min.css" />

  <body class="page-results">
    <div class="wrapper">
      <main class="main">
        


<section class="results" data-aos="fade">

  <div class="container">
    <div class="results__layout">
      <a class="results__logo logo" href="#">
        <img class="logo__image" src="images/logo.svg" alt="logo">

            <li class="results__type results__type--blocks" tabindex="0" role="button" aria-pressed="false">

              aria-pressed="true">
              Списком
            </li>
          </ul>
        </div>
        <div class="results__body">
          <ul class="results__list">

              </div>
            </li>
          </ul>
        </div>

        <form class="results__form" action="#" method="post">
          
  <div class="select js-select select--up results__select">
    <input class="select__input" type="hidden" name="listSource" value="current-list">
    <button class="select__trigger" type="button" aria-expanded="false" aria-haspopup="listbox">
      <span class="select__value">Убрать из списка текущих победителей</span>
      <svg width="31" height="31" viewBox="0 0 31 31" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.5 9.5L15.5 21.5L28.5 9.5" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"
          stroke-linejoin="round" />
      </svg>
    </button>
    <ul class="select__dropdown" role="listbox">
      
        <li>
          <button class="select__option is-selected" type="button"
            data-value="current-list" role="option" aria-selected="true">
            Убрать из списка текущих победителей
          </button>
        </li>
      
        <li>
          <button class="select__option" type="button"
            data-value="imported-list" role="option" aria-selected="false">
            другое
          </button>
        </li>
